syntax = "proto3";

package io.suboptimal.buffjson.proto;

option java_package = "io.suboptimal.buffjson.proto";
option java_outer_classname = "BenchmarkStressProto";
option java_multiple_files = true;

enum BenchEnum {
    BENCH_ENUM_UNSPECIFIED = 0;
    BENCH_ENUM_ONE = 1;
    BENCH_ENUM_TWO = 2;
    BENCH_ENUM_THREE = 3;
}

// All 15 proto3 scalar types + enum in one message
message BenchAllScalars {
    int32 f_int32 = 1;
    int64 f_int64 = 2;
    uint32 f_uint32 = 3;
    uint64 f_uint64 = 4;
    sint32 f_sint32 = 5;
    sint64 f_sint64 = 6;
    fixed32 f_fixed32 = 7;
    fixed64 f_fixed64 = 8;
    sfixed32 f_sfixed32 = 9;
    sfixed64 f_sfixed64 = 10;
    float f_float = 11;
    double f_double = 12;
    bool f_bool = 13;
    string f_string = 14;
    bytes f_bytes = 15;
    BenchEnum f_enum = 16;
}

// Repeated fields with 100+ elements
message BenchRepeatedHeavy {
    repeated int32 ints = 1;
    repeated string strings = 2;
    repeated BenchAllScalars messages = 3;
}

// Map fields with different key/value types
message BenchMapHeavy {
    map<string, string> string_map = 1;
    map<int64, string> int_key_map = 2;
    map<string, BenchAllScalars> message_map = 3;
}

// Recursive for deep nesting
message BenchDeepNesting {
    string name = 1;
    int32 value = 2;
    BenchDeepNesting child = 3;
}

// Double-heavy message (20-30 fields)
message BenchDoubleHeavy {
    double lat = 1;
    double lng = 2;
    double altitude = 3;
    double speed = 4;
    double heading = 5;
    double accuracy = 6;
    double temperature = 7;
    double pressure = 8;
    double humidity = 9;
    double wind_speed = 10;
    double wind_direction = 11;
    double visibility = 12;
    double uv_index = 13;
    double dew_point = 14;
    double feels_like = 15;
    double precipitation = 16;
    double cloud_cover = 17;
    double solar_radiation = 18;
    double soil_temperature = 19;
    double soil_moisture = 20;
    double voltage = 21;
    double current = 22;
    double power = 23;
    double frequency = 24;
    double signal_strength = 25;
}

// String/bytes stress
message BenchStringHeavy {
    string short_ascii = 1;
    string long_ascii = 2;
    string unicode_text = 3;
    string escape_heavy = 4;
    bytes small_payload = 5;
    bytes large_payload = 6;
}
