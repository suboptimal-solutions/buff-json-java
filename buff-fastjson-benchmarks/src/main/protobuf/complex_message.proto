syntax = "proto3";

package io.suboptimal.buffjson.proto;

import "google/protobuf/timestamp.proto";
import "simple_message.proto";

option java_package = "io.suboptimal.buffjson.proto";
option java_outer_classname = "ComplexMessageProto";
option java_multiple_files = true;

message Address {
    string street = 1;
    string city = 2;
    string state = 3;
    string zip_code = 4;
    string country = 5;
}

message Tag {
    string key = 1;
    string value = 2;
}

message ComplexMessage {
    string id = 1;
    string name = 2;
    int32 version = 3;

    // Nested message
    Address primary_address = 4;

    // Repeated fields
    repeated string tags_list = 5;
    repeated Address addresses = 6;
    repeated Tag tags = 7;

    // Map fields
    map<string, string> metadata = 8;
    map<int32, Address> address_book = 9;

    // Oneof
    oneof contact {
        string email = 10;
        string phone = 11;
    }

    // Bytes (base64 in JSON)
    bytes payload = 12;

    // Well-known types
    google.protobuf.Timestamp created_at = 13;
    google.protobuf.Timestamp updated_at = 14;

    // Enum
    Status status = 15;
}
