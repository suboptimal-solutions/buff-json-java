syntax = "proto3";

package io.suboptimal.buffjson.proto;

import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option java_package = "io.suboptimal.buffjson.proto";
option java_outer_classname = "ConformanceTestProto";
option java_multiple_files = true;

// Covers all scalar types
message TestAllScalars {
    int32 optional_int32 = 1;
    int64 optional_int64 = 2;
    uint32 optional_uint32 = 3;
    uint64 optional_uint64 = 4;
    sint32 optional_sint32 = 5;
    sint64 optional_sint64 = 6;
    fixed32 optional_fixed32 = 7;
    fixed64 optional_fixed64 = 8;
    sfixed32 optional_sfixed32 = 9;
    sfixed64 optional_sfixed64 = 10;
    float optional_float = 11;
    double optional_double = 12;
    bool optional_bool = 13;
    string optional_string = 14;
    bytes optional_bytes = 15;
}

// Repeated fields of all scalar types
message TestRepeatedScalars {
    repeated int32 repeated_int32 = 1;
    repeated int64 repeated_int64 = 2;
    repeated uint32 repeated_uint32 = 3;
    repeated uint64 repeated_uint64 = 4;
    repeated sint32 repeated_sint32 = 5;
    repeated sint64 repeated_sint64 = 6;
    repeated fixed32 repeated_fixed32 = 7;
    repeated fixed64 repeated_fixed64 = 8;
    repeated sfixed32 repeated_sfixed32 = 9;
    repeated sfixed64 repeated_sfixed64 = 10;
    repeated float repeated_float = 11;
    repeated double repeated_double = 12;
    repeated bool repeated_bool = 13;
    repeated string repeated_string = 14;
    repeated bytes repeated_bytes = 15;
}

// Nested messages and enums
enum TestEnum {
    TEST_ENUM_UNSPECIFIED = 0;
    TEST_ENUM_FOO = 1;
    TEST_ENUM_BAR = 2;
    TEST_ENUM_BAZ = 3;
}

message NestedMessage {
    int32 value = 1;
    string name = 2;
}

message TestNesting {
    NestedMessage nested = 1;
    repeated NestedMessage repeated_nested = 2;
    TestEnum enum_value = 3;
    repeated TestEnum repeated_enum = 4;
}

// Recursive message
message TestRecursive {
    int32 value = 1;
    TestRecursive child = 2;
}

// Oneof field
message TestOneof {
    string name = 1;
    oneof value {
        int32 int_value = 2;
        string string_value = 3;
        bool bool_value = 4;
        NestedMessage message_value = 5;
        TestEnum enum_value = 6;
    }
}

// Map fields with various key types
message TestMaps {
    map<string, string> string_to_string = 1;
    map<int32, string> int32_to_string = 2;
    map<int64, string> int64_to_string = 3;
    map<uint32, string> uint32_to_string = 4;
    map<uint64, string> uint64_to_string = 5;
    map<sint32, string> sint32_to_string = 6;
    map<sint64, string> sint64_to_string = 7;
    map<fixed32, string> fixed32_to_string = 8;
    map<fixed64, string> fixed64_to_string = 9;
    map<sfixed32, string> sfixed32_to_string = 10;
    map<sfixed64, string> sfixed64_to_string = 11;
    map<bool, string> bool_to_string = 12;

    // Map with different value types
    map<string, int32> string_to_int32 = 13;
    map<string, int64> string_to_int64 = 14;
    map<string, float> string_to_float = 15;
    map<string, double> string_to_double = 16;
    map<string, bool> string_to_bool = 17;
    map<string, bytes> string_to_bytes = 18;
    map<string, NestedMessage> string_to_message = 19;
    map<string, TestEnum> string_to_enum = 20;
}

// All well-known wrapper types
message TestWrappers {
    google.protobuf.Int32Value int32_value = 1;
    google.protobuf.UInt32Value uint32_value = 2;
    google.protobuf.Int64Value int64_value = 3;
    google.protobuf.UInt64Value uint64_value = 4;
    google.protobuf.FloatValue float_value = 5;
    google.protobuf.DoubleValue double_value = 6;
    google.protobuf.BoolValue bool_value = 7;
    google.protobuf.StringValue string_value = 8;
    google.protobuf.BytesValue bytes_value = 9;
}

// Well-known types: Timestamp and Duration
message TestTimestamp {
    google.protobuf.Timestamp value = 1;
}

message TestDuration {
    google.protobuf.Duration value = 1;
}

// Well-known types: FieldMask
message TestFieldMask {
    google.protobuf.FieldMask value = 1;
}

// Well-known types: Struct, Value, ListValue
message TestStruct {
    google.protobuf.Struct struct_value = 1;
    google.protobuf.Value value = 2;
    google.protobuf.ListValue list_value = 3;
}

// Proto3 explicit presence (optional keyword)
message TestOptionalFields {
    optional int32 optional_int32 = 1;
    optional string optional_string = 2;
    optional bool optional_bool = 3;
    optional NestedMessage optional_message = 4;
    optional TestEnum optional_enum = 5;
}

// Custom JSON name
message TestCustomJsonName {
    int32 value = 1 [json_name = "@value"];
    string name = 2 [json_name = "Name"];
}

// Any type
message TestAny {
    google.protobuf.Any value = 1;
}

// Empty type
message TestEmpty {
    google.protobuf.Empty value = 1;
}
